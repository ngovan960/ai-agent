# Staging Deployment Configuration
# Used by DeploymentService for staging environment setup

environment:
  name: staging
  replicas: 1
  resource_limits:
    cpu: "1.0"
    memory: "1Gi"
  resource_requests:
    cpu: "0.5"
    memory: "512Mi"

health_check:
  endpoint: /health
  interval: 30s
  timeout: 10s
  retries: 3
  start_period: 60s

smoke_tests:
  enabled: true
  endpoints:
    - /health
    - /api/v1/projects/
    - /api/v1/tasks/
  max_retries: 2
  retry_delay: 5s

rollback:
  auto_rollback: true
  max_rollbacks: 3
  health_check_failures: 3
  error_rate_threshold: 0.05
