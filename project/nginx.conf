worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    upstream api_servers {
        server api:8000 max_fails=3 fail_timeout=30s;
    }

    upstream dashboard_servers {
        server dashboard:3000 max_fails=3 fail_timeout=30s;
    }

    server {
        listen 80;
        server_name _;

        # FastAPI docs endpoints
        location /docs {
            proxy_pass http://api_servers/docs;
            proxy_set_header Host $host;
        }
        location /openapi.json {
            proxy_pass http://api_servers/openapi.json;
            proxy_set_header Host $host;
        }
        location /redoc {
            proxy_pass http://api_servers/redoc;
            proxy_set_header Host $host;
        }

        # Health check endpoints
        location /health {
            proxy_pass http://api_servers/health;
            proxy_set_header Host $host;
            proxy_read_timeout 10s;
        }

        # API proxy
        location /api/ {
            proxy_pass http://api_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
            proxy_connect_timeout 10s;

            proxy_intercept_errors on;
            error_page 502 503 504 /503.html;
        }

        # Dashboard proxy (everything else)
        location / {
            proxy_pass http://dashboard_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # Error page
        location /503.html {
            internal;
            return 503 "Service Unavailable - Please try again later";
        }
    }

    # SSL server block - requires valid SSL certificate
    # To enable HTTPS in production:
    # 1. Install certbot: apt-get install certbot
    # 2. Obtain cert: certbot certonly --nginx -d yourdomain.com
    # 3. Uncomment the server block below
    # 4. Update paths to your certificate files
    # server {
    #     listen 443 ssl http2;
    #     server_name example.com;
    #
    #     ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #
    #     location / {
    #         proxy_pass http://dashboard_servers;
    #     }
    #
    #     location /api/ {
    #         proxy_pass http://api_servers;
    #     }
    # }
}
