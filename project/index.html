<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT Clone</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" id="newChatBtn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    New chat
                </button>
            </div>
            <div class="sidebar-search">
                <input type="text" placeholder="Search conversations..." class="search-input" id="searchInput">
            </div>
            <nav class="conversation-list" id="conversationList">
                <div class="conversation-item active">
                    <span class="conversation-title">New conversation</span>
                    <button class="conversation-menu">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="5" r="2"></circle>
                            <circle cx="12" cy="12" r="2"></circle>
                            <circle cx="12" cy="19" r="2"></circle>
                        </svg>
                    </button>
                </div>
                <div class="conversation-item">
                    <span class="conversation-title">Previous chat example</span>
                    <button class="conversation-menu">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="5" r="2"></circle>
                            <circle cx="12" cy="12" r="2"></circle>
                            <circle cx="12" cy="19" r="2"></circle>
                        </svg>
                    </button>
                </div>
                <div class="conversation-item">
                    <span class="conversation-title">How to learn programming</span>
                    <button class="conversation-menu">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="5" r="2"></circle>
                            <circle cx="12" cy="12" r="2"></circle>
                            <circle cx="12" cy="19" r="2"></circle>
                        </svg>
                    </button>
                </div>
            </nav>
            <div class="sidebar-footer">
                <button class="sidebar-footer-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    User Account
                </button>
            </div>
        </aside>
        <main class="main-content">
            <header class="main-header">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <div class="model-selector">
                    <button class="model-btn" id="modelBtn">
                        <span class="model-name">GPT-4o</span>
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"></polyline>
                        </svg>
                    </button>
                </div>
                <div class="header-actions">
                    <button class="header-action-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                        </svg>
                    </button>
                </div>
            </header>
            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-logo">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.2819 9.8211a5.9847 5.9847 0 0 0-.5157-4.9108 6.0462 6.0462 0 0 0-6.5098-2.9A6.0651 6.0651 0 0 0 4.9807 4.1818a5.9847 5.9847 0 0 0-3.9977 2.9 6.0462 6.0462 0 0 0 .7427 7.0902 5.98 5.98 0 0 0 .511 4.9107 6.051 6.051 0 0 0 6.5146 2.9001A5.9847 5.9847 0 0 0 13.2519 24a6.0557 6.0557 0 0 0 5.7717-4.2058 5.9847 5.9847 0 0 0 3.9978-2.9001 6.0557 6.0557 0 0 0-.7395-7.0729zm-10.064 11.4436a3.9653 3.9653 0 0 1-2.8296-1.1093l-.0331-.0331a3.97 3.97 0 0 1-1.153-2.8296c0-.4698.071-.9349.212-1.3807l.0331-.0994a3.9747 3.9747 0 0 1 1.9917-2.3587 3.9606 3.9606 0 0 1 1.7809-.4219c.4698 0 .9349.071 1.3807.212l.0994.0331a3.9747 3.9747 0 0 1 2.3587 1.9917 3.9653 3.9653 0 0 1-.4219 4.6126 3.9747 3.9747 0 0 1-2.3587 1.9917 3.9606 3.9606 0 0 1-1.3807.212l-.0994-.0331a3.9747 3.9747 0 0 1-1.3807-.212zm6.206-5.9667a3.9653 3.9653 0 0 1-1.1093 2.8296l-.0331.0331a3.97 3.97 0 0 1-2.8296 1.153c-.4698 0-.9349-.071-1.3807-.212l-.0994-.0331a3.9747 3.9747 0 0 1-2.3587-1.9917 3.9606 3.9606 0 0 1-.4219-1.7809c0-.4698.071-.9349.212-1.3807l.0331-.0994a3.9747 3.9747 0 0 1 1.9917-2.3587 3.9653 3.9653 0 0 1 4.6126.4219 3.9747 3.9747 0 0 1 1.9917 2.3587 3.9606 3.9606 0 0 1 .4219 1.7809c0 .4698-.071.9349-.212 1.3807l-.0331.0994a3.9747 3.9747 0 0 1-.212 1.3807z"/>
                        </svg>
                    </div>
                    <h1 class="welcome-title">Hello there!</h1>
                    <p class="welcome-subtitle">How can I help you today?</p>
                    <div class="suggestion-cards">
                        <div class="suggestion-card">
                            <div class="suggestion-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                            </div>
                            <span class="suggestion-text">Explain quantum computing in simple terms</span>
                        </div>
                        <div class="suggestion-card">
                            <div class="suggestion-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <polyline points="16 18 22 12 16 6"></polyline>
                                    <polyline points="8 6 2 12 8 18"></polyline>
                                </svg>
                            </div>
                            <span class="suggestion-text">Help me write a Python script</span>
                        </div>
                        <div class="suggestion-card">
                            <div class="suggestion-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                    <path d="M2 17l10 5 10-5"></path>
                                    <path d="M2 12l10 5 10-5"></path>
                                </svg>
                            </div>
                            <span class="suggestion-text">Brainstorm ideas for a new project</span>
                        </div>
                        <div class="suggestion-card">
                            <div class="suggestion-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                    <line x1="3" y1="9" x2="21" y2="9"></line>
                                    <line x1="9" y1="21" x2="9" y2="9"></line>
                                </svg>
                            </div>
                            <span class="suggestion-text">Create a meal plan for the week</span>
                        </div>
                    </div>
                </div>
                <div class="messages" id="messages"></div>
            </div>
            <div class="input-area">
                <div class="input-container">
                    <div class="input-wrapper">
                        <textarea class="message-input" id="messageInput" placeholder="Message ChatGPT..." rows="1"></textarea>
                        <button class="attach-btn" id="attachBtn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                    </div>
                    <button class="send-btn" id="sendBtn" disabled>
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                        </svg>
                    </button>
                </div>
                <p class="input-disclaimer">ChatGPT can make mistakes. Check important info.</p>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
