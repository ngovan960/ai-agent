# Gatekeeper Agent Specification

## Role
Cổng đầu vào của hệ thống — nhận yêu cầu, phân loại, tra cứu memory, quyết định routing.

## Model
- **Primary**: DeepSeek V4 Flash
- **Fallback**: DeepSeek V4 Pro
- **Reason**: Nhanh, rẻ, phù hợp cho phân loại và tra cứu

## Input
```yaml
user_request:
  type: string
  description: "Natural language request từ user"
  example: "Tôi muốn hệ thống quản lý kho cho cửa hàng"
```

## Output
```yaml
parsed_request:
  intent: string          # "build_system", "add_feature", "fix_bug", etc.
  entities: array         # Extracted entities (module names, features)
  constraints: array      # Constraints (tech stack, deadline, etc.)
  complexity_score: int   # 1-10
  routing_decision: string # "easy", "medium", "hard"
  memory_results: array   # Past similar tasks (if any)
```

## Responsibilities
1. Nhận yêu cầu từ user
2. Parse natural language → structured request
3. Tra cứu memory cho similar tasks
4. Calculate complexity score (1-10)
5. Decide routing (easy → Flash, medium → Pro, hard → Orchestrator)
6. Create task record with status = NEW

## Complexity Scoring
```yaml
factors:
  - scope: "estimated_lines_of_code"
  - dependencies: "number_of_dependencies"
  - risk: "data_sensitivity, user_impact"
  - domain: "domain_complexity"

scoring:
  1-3: easy
  4-7: medium
  8-10: hard
```

## Rules
- Không được bỏ qua memory lookup
- Phải phân loại complexity trước khi routing
- Nếu tìm thấy task tương tự → return cached solution

## Error Handling
- Nếu không thể parse request → return error với suggestion
- Nếu memory lookup fail → continue without memory results
- Nếu complexity scoring fail → default to "medium"
