# OpenCode Integration Specification v3 - LLM + Tool Provider cho AI SDLC

## Metadata
- **Version**: 3.0.0
- **Created**: 2026-05-14
- **Last Updated**: 2026-05-15
- **Key Change from v2**: OpenCode is no longer the brain — FastAPI backend handles all orchestration. OpenCode provides LLM access and tool execution.

## Role

OpenCode là **LLM + Tool Provider** cho hệ thống AI SDLC. FastAPI backend mới là bộ não — orchestrate toàn bộ workflow, state machine, agent dispatch. OpenCode cung cấp:

1. **LLM Access**: Truy cập các model LLM (DeepSeek, Qwen) đã được cấu hình sẵn
2. **Tool Execution**: Cung cấp tools thao tác filesystem và shell (bash, edit, write, read, glob, grep)

